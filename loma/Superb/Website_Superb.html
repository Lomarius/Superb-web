<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Website_Superb.css">
    <title>Superb</title>
</head>
<body>
    <div class="header-banner">
        <h1>Superb</h1>
        <nav class="nav-to-page">
            <a href="">About Us</a>
            <a href="">Products</a>
            <a href="">Services</a>
            <a href="">Our Work</a>
            <a href="">Our Certificate</a>
            <a href="">News</a>
            <a href="">Hiring</a>
        </nav>
        <div class="en-th">
            <button>EN</button>
            <label for="#header">|</label>
            <button>TH</button>
        </div>
    </div>
    <!-- content-1 -->
    <div class="content-1">
        <div class="slideshow">
            <div class="slide fade">
                <img src="images/21-9-HD-Wallpaper-Free-download.jpg" class="slide-img">
            </div>
            <div class="slide fade">
                <img src="images/21-9-Wallpaper-Free-Download.jpg" class="slide-img">
            </div>
            <div class="slide fade">
                <img src="images/21-9-Wallpaper-High-Quality.jpg" class="slide-img">
            </div>
            <a class="prev" onclick="plusSlides(-1)">❮</a>
            <a class="next" onclick="plusSlides(1)">❯</a>
        </div>
        <br>
        <div style="text-align:center">
            <span class="dot" onclick="currentSlide(1)"></span> 
            <span class="dot" onclick="currentSlide(2)"></span> 
            <span class="dot" onclick="currentSlide(3)"></span> 
        </div>
    </div>
    <!-- content-1 -->

<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  let i;
  let slides = document.getElementsByClassName("slide");
  let dots = document.getElementsByClassName("dot");
  if (n > slides.length) {slideIndex = 1}    
  if (n < 1) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";  
  dots[slideIndex-1].className += " active";
}
</script>

</body>
</html>
